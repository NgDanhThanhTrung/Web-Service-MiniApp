<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; padding: 30px; }
        .container { max-width: 1000px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { color: #333; border-bottom: 2px solid #007aff; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #f1f1f1; color: #555; }
        .coin { color: #f39c12; font-weight: bold; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #ddd; width: 200px; }
        button { padding: 10px 20px; background: #007aff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Dữ liệu người dùng</h2>
        <input type="password" id="pass" placeholder="Mã Admin">
        <button onclick="load()">Tải dữ liệu</button>
        <table id="table">
            <thead>
                <tr>
                    <th>Telegram ID</th>
                    <th>Tên / Username</th>
                    <th>Số dư (🪙)</th>
                    <th>Lượt quay</th>
                    <th>Ref</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>
    <script>
        async function load() {
            const pass = document.getElementById('pass').value;
            const res = await fetch(`/api/admin/users?pass=${pass}`);
            if (!res.ok) return alert("Mật khẩu sai!");
            const data = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = data.map(u => `
                <tr>
                    <td><code>${u.telegramId}</code></td>
                    <td>${u.name} (@${u.username})</td>
                    <td class="coin">${u.totalCoins.toLocaleString()}</td>
                    <td>${u.spinsLeft}</td>
                    <td>${u.refs}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
