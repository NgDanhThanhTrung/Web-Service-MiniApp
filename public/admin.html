<!DOCTYPE html>
<html>
<head><title>Admin</title><link rel="stylesheet" href="style.css"></head>
<body style="padding:20px;">
    <h2>Quản lý người dùng</h2>
    <input type="password" id="p" placeholder="Mật khẩu Admin">
    <button onclick="load()">Xem danh sách</button>
    <table border="1" id="t" style="width:100%; margin-top:20px; color:white;"></table>
    <script>
        async function load() {
            const pass = document.getElementById('p').value;
            const res = await fetch(`/api/admin/users?pass=${pass}`);
            const data = await res.json();
            let h = '<tr><th>Tên</th><th>Xu</th><th>Mời</th></tr>';
            data.forEach(u => h += `<tr><td>${u.first_name}</td><td>${u.coins}</td><td>${u.refs}</td></tr>`);
            document.getElementById('t').innerHTML = h;
        }
    </script>
</body>
</html>
