<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siêu Cấp Kiếm Xu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="user-row">
            <div id="avatar">👤</div>
            <div class="user-text">
                <div id="display-name">Người dùng</div>
                <div id="display-username">@username</div>
            </div>
        </div>
        <div class="balance-card">
            <small>SỐ DƯ HIỆN TẠI</small>
            <h1 id="txt-balance">0</h1>
            <p id="txt-vnd">≈ 0 VNĐ</p>
        </div>
    </header>

    <main class="content">
        <div class="stats">
            <div class="stat"><span>Lượt Free</span><b id="txt-spins">0</b></div>
            <div class="stat"><span>Ads/Ngày</span><b id="txt-ads">0/15</b></div>
        </div>

        <button class="btn-main" onclick="handleAction(false)">🎁 NHẬN XU FREE</button>
        <button class="btn-ads" onclick="showAds()">📺 XEM QUẢNG CÁO (+1 Lượt)</button>

        <nav class="bottom-nav">
            <div class="nav-item active"><span>🎡</span><small>Chơi</small></div>
            <div class="nav-item" onclick="tg.showAlert('Tính năng sắp ra mắt!')"><span>👥</span><small>Mời bạn</small></div>
            <div class="nav-item" onclick="tg.showAlert('Chức năng rút tiền đang bảo trì!')"><span>💳</span><small>Ví</small></div>
        </nav>
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user;
        let AdController;

        async function init() {
            const cfg = await (await fetch('/api/config')).json();
            if (window.Adsgram) AdController = window.Adsgram.init({ blockId: cfg.adsgramId });
            loadData();
        }

        async function loadData() {
            if(!user) return;
            const res = await fetch('/api/status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    telegramId: user.id.toString(),
                    username: user.username,
                    name: user.first_name
                })
            });
            const d = await res.json();
            document.getElementById('display-name').innerText = d.name;
            document.getElementById('display-username').innerText = d.username !== 'n/a' ? '@'+d.username : '';
            document.getElementById('avatar').innerText = d.name.charAt(0).toUpperCase();
            document.getElementById('txt-balance').innerText = d.totalCoins.toLocaleString();
            document.getElementById('txt-vnd').innerText = `≈ ${(d.totalCoins/1000).toLocaleString()} VNĐ`;
            document.getElementById('txt-spins').innerText = d.spinsLeft;
            document.getElementById('txt-ads').innerText = d.adsWatchedToday + '/15';
        }

        async function handleAction(isAds) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            const res = await fetch('/api/claim', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.id.toString(), isAds })
            });
            const r = await res.json();
            if (r.success) {
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert(`🎉 Chúc mừng! Bạn nhận được ${r.lucky.toLocaleString()} xu.`);
                loadData();
            } else tg.showAlert(r.message);
        }

        function showAds() {
            if (!AdController) return tg.showAlert("QC chưa tải xong!");
            AdController.show().then(() => handleAction(true)).catch(() => tg.showAlert("Bạn chưa xem hết QC!"));
        }

        init(); tg.expand();
    </script>
</body>
</html>
