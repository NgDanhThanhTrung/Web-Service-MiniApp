<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nông Trại Khai Thác Ảo</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1 id="user-display">Đang tải...</h1>
            <div class="level-tag" id="level-tag">Cấp Độ: 1</div>
        </header>

        <section class="stat-grid">
            <div class="stat-card">
                <span class="card-title">🌾 Xu Thường (Coins)</span>
                <span class="card-val" id="coins-bal">0.00</span>
            </div>
            <div class="stat-card">
                <span class="card-title">💎 Kim Cương (Diamonds)</span>
                <span class="card-val" id="diamonds-bal">0</span>
            </div>
        </section>

        <main class="mining-box">
            <div class="rate-indicator">Tốc độ: <span id="rate-val">0</span> Xu/giây</div>
            <div class="pending-box">Tích lũy: <span id="pending-val">0.0000</span> Xu</div>
            
            <button id="mining-toggle-btn" class="main-btn">🚜 KHỞI ĐỘNG MÁY ĐÀO</button>
            <button id="harvest-btn" class="main-btn secondary" style="display: none;">🧺 THU HOẠCH XU</button>
        </main>

        <section class="shop-box">
            <h3>Cửa Hàng Trao Đổi (Đốt Xu)</h3>
            <div class="shop-actions">
                <button id="buy-diamond-btn" class="shop-btn">Mua 10 💎 (20,000 Xu)</button>
            </div>
        </section>

        <footer class="controls">
            <button id="upgrade-btn" class="control-btn up-btn">🚀 Nâng Cấp (<span id="up-cost">100</span> 💎)</button>
            <button id="ads-btn" class="control-btn ads-btn">📺 Xem QC (+400K Xu)</button>
            <button id="withdraw-btn" class="control-btn out-btn">💳 Rút Tiền Về Ví</button>
            <div class="info-text">Xem quảng cáo hôm nay: <span id="ads-today">0</span>/15</div>
        </footer>
    </div>
    <script src="js/game.js"></script>
</body>
</html>
