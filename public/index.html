<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Spin App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        :root { --main: #007aff; --bg: #f5f5f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; text-align: center; color: #333; }
        .card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .tabs { display: flex; background: #eee; border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; border-radius: 9px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .tab.active { background: #fff; color: var(--main); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .content { display: none; }
        .content.active { display: block; }
        .balance-label { font-size: 14px; color: #888; }
        .balance-value { font-size: 36px; font-weight: bold; color: #f39c12; margin: 5px 0; }
        .btn { background: var(--main); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .info-row { display: flex; justify-content: space-around; margin: 15px 0; font-size: 13px; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <div class="tabs">
            <div class="tab active" onclick="showTab('play')">🎰 Quay số</div>
            <div class="tab" onclick="showTab('ref')">👥 Bạn bè</div>
            <div class="tab" onclick="showTab('withdraw')">🏦 Rút tiền</div>
        </div>

        <div class="balance-label">Số dư hiện tại</div>
        <div id="coin-balance" class="balance-value">0 🪙</div>
        <div id="vnd-value" style="color: #888; margin-bottom: 20px;">≈ 0 VNĐ</div>

        <div id="play" class="content active">
            <div class="info-row">
                <span>Lượt FREE: <b id="spins-left">0</b></span>
                <span>Xem QC hôm nay: <b id="ads-today">0/15</b></span>
            </div>
            <button class="btn" onclick="startClaim()">BẮT ĐẦU NHẬN XU</button>
        </div>

        <div id="ref" class="content">
            <p style="font-size: 14px;">Mời bạn bè tham gia để nhận ngay <br><b>10,000 xu/người</b></p>
            <input type="text" id="ref-url" readonly>
            <button class="btn" style="background:#28a745" onclick="shareRef()">GỬI LINK MỜI</button>
        </div>

        <div id="withdraw" class="content">
            <select id="w-method">
                <option value="momo">Ví Momo (Min 500đ)</option>
                <option value="bank">Ngân hàng (Min 2000đ)</option>
                <option value="ton">Ví TON (Min 0.0003 TON)</option>
            </select>
            <input type="number" id="w-amount" placeholder="Nhập số tiền VNĐ muốn rút">
            <input type="text" id="w-details" placeholder="SĐT hoặc Số tài khoản nhận">
            <button class="btn" style="background:#e67e22" onclick="handleWithdraw()">GỬI YÊU CẦU RÚT</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const AdController = window.Adsgram.init({ blockId: "YOUR_ADSGRAM_BLOCK_ID" });
        const user = tg.initDataUnsafe.user;
        const startParam = tg.initDataUnsafe.start_param;

        async function fetchStatus() {
            const res = await fetch('/api/status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.id.toString(), username: user.username, name: user.first_name, refId: startParam })
            });
            const data = await res.json();
            document.getElementById('coin-balance').innerText = data.totalCoins.toLocaleString() + ' 🪙';
            document.getElementById('vnd-value').innerText = `≈ ${(data.totalCoins/1000).toLocaleString()} VNĐ`;
            document.getElementById('spins-left').innerText = data.spinsLeft;
            document.getElementById('ads-today').innerText = data.adsWatchedToday + '/15';
            document.getElementById('ref-url').value = `https://t.me/YOUR_BOT_USERNAME/app?startapp=${user.id}`;
        }

        async function startClaim() {
            const spins = parseInt(document.getElementById('spins-left').innerText);
            if (spins > 0) return processClaim();
            // Nếu hết lượt miễn phí, yêu cầu xem quảng cáo
            AdController.show().then(() => processClaim()).catch(() => tg.showAlert("Bạn cần xem hết quảng cáo để nhận thêm lượt!"));
        }

        async function processClaim() {
            const res = await fetch('/api/claim', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.id.toString() })
            });
            const result = await res.json();
            if (result.success) {
                tg.showAlert(`🎉 Chúc mừng! Bạn nhận được ${result.lucky} xu.`);
                fetchStatus();
            } else {
                tg.showAlert(result.message || "Đã xảy ra lỗi!");
            }
        }

        async function handleWithdraw() {
            const amount = document.getElementById('w-amount').value;
            const method = document.getElementById('w-method').value;
            const details = document.getElementById('w-details').value;

            if (!amount || !details) return tg.showAlert("Vui lòng điền đủ thông tin!");

            const res = await fetch('/api/withdraw', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.id.toString(), amountVnd: amount, method, details })
            });
            const result = await res.json();
            if (result.success) {
                tg.showConfirm("Lệnh rút đã được gửi thành công. Admin sẽ xử lý trong vòng 24h.");
                fetchStatus();
            } else {
                tg.showAlert("Số dư của bạn không đủ!");
            }
        }

        function showTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function shareRef() {
            const url = document.getElementById('ref-url').value;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=Vòng quay may mắn nhận xu mỗi ngày! 🎰`);
        }

        fetchStatus();
        tg.expand();
    </script>
</body>
</html>
