<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siêu Cấp Kiếm Xu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="top-nav">
        <div class="user-pill">
            <div id="avatar">?</div>
            <div>
                <div id="u-name">Loading...</div>
                <div id="u-username">@user</div>
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="balance-card">
            <p>SỐ DƯ COINS</p>
            <h1 id="balance">0</h1>
            <p id="vnd">≈ 0 VNĐ</p>
        </div>

        <div class="grid-stats">
            <div class="stat-item"><i class="fas fa-bolt"></i> <span id="spins">0</span> Lượt</div>
            <div class="stat-item"><i class="fas fa-tv"></i> <span id="ads">0/15</span> Ads</div>
        </div>

        <button class="btn-main" onclick="handleClaim(false)">🎁 NHẬN XU FREE</button>
        <button class="btn-ads" onclick="showAds()">📺 XEM QC NHẬN XU (RANDOM)</button>
    </main>

    <nav class="bottom-bar">
        <div class="nav-btn active"><i class="fas fa-coins"></i><span>Kiếm xu</span></div>
        <div class="nav-btn" onclick="tg.showAlert('Tính năng rút tiền sắp ra mắt!')"><i class="fas fa-wallet"></i><span>Ví</span></div>
        <div class="nav-btn" onclick="window.location.href='/account'"><i class="fas fa-user-cog"></i><span>Admin</span></div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user;
        let ads;

        async function init() {
            const cfg = await (await fetch('/api/config')).json();
            if (window.Adsgram) ads = window.Adsgram.init({ blockId: cfg.adsgramId });
            updateUI();
        }

        async function updateUI() {
            const res = await fetch('/api/status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.id.toString(), username: user.username, name: user.first_name })
            });
            const d = await res.json();
            document.getElementById('u-name').innerText = d.name;
            document.getElementById('u-username').innerText = d.username ? '@'+d.username : '';
            document.getElementById('avatar').innerText = d.name.charAt(0).toUpperCase();
            document.getElementById('balance').innerText = d.totalCoins.toLocaleString();
            document.getElementById('vnd').innerText = `≈ ${(d.totalCoins/1000).toLocaleString()} VNĐ`;
            document.getElementById('spins').innerText = d.spinsLeft;
            document.getElementById('ads').innerText = d.adsWatchedToday + '/15';
        }

        async function handleClaim(isAds) {
            tg.HapticFeedback.impactOccurred('medium');
            const res = await fetch('/api/claim', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.id.toString(), isAds })
            });
            const r = await res.json();
            if (r.success) {
                tg.showAlert(`🎉 +${r.lucky.toLocaleString()} xu!`);
                updateUI();
            } else tg.showAlert(r.message);
        }

        function showAds() {
            if (!ads) return tg.showAlert("QC chưa sẵn sàng");
            ads.show().then(() => handleClaim(true)).catch(() => tg.showAlert("Xem hết QC để nhận xu!"));
        }

        init(); tg.expand();
    </script>
</body>
</html>
