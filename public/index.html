<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siêu Cấp Kiếm Xu </title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="balance-card">
                <small>TỔNG TÀI SẢN (1000 XU = 1 VNĐ)</small>
                <h1 id="b-coins">0</h1>
                <p id="b-vnd">≈ 0 VNĐ</p>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'play')">🎡 KIẾM XU</button>
            <button class="tab-btn" onclick="openTab(event, 'ref')">👥 MỜI BẠN</button>
            <button class="tab-btn" onclick="openTab(event, 'bank')">🏦 RÚT TIỀN</button>
        </div>

        <main class="main">
            <div id="play" class="tab-content active">
                <div class="stats-row">
                    <div class="stat">Lượt Quay: <b id="s-free">0</b></div>
                    <div class="stat">Ads: <b id="s-ads">0/15</b></div>
                </div>
                <button class="btn-main" onclick="claim('spin')">🎁 NHẬN XU FREE</button>
                <button class="btn-ads" onclick="showAds()">📺 XEM QC (RANDOM 500-50K)</button>
            </div>

            <div id="ref" class="tab-content">
                <div class="ref-box">
                    <h3>👥 Mời Bạn Nhận 10.000 Xu</h3>
                    <p style="font-size: 12px; color: #848e9c; margin-bottom: 15px;">Bạn bè nhận ngay 10 lượt quay khi tham gia qua link của bạn.</p>
                    <input type="text" id="ref-link" readonly>
                    <button class="btn-copy" onclick="copyLink()">SAO CHÉP LINK</button>
                </div>
            </div>

            <div id="bank" class="tab-content">
                <div class="withdraw-form">
                    <label style="font-size: 12px; color: #f1b90c;">CHỌN ĐƠN VỊ RÚT:</label>
                    <select id="w-unit" onchange="toggleLimit()">
                        <option value="VND">VNĐ (Ngân hàng / Ví điện tử)</option>
                        <option value="TON">TON (Ví TON / Telegram Wallet)</option>
                    </select>

                    <input type="number" id="w-amount" placeholder="Số lượng muốn rút">
                    <p id="withdraw-limit" style="font-size: 11px; color: #848e9c; margin-top:-10px; margin-bottom:15px;">Tối thiểu: 2,000 VNĐ</p>

                    <label style="font-size: 12px; color: #f1b90c;">CỔNG THANH TOÁN:</label>
                    <select id="w-method">
                        <option value="Ngân hàng">Ngân hàng</option>
                        <option value="Ví điện tử">Ví điện tử (Momo/ZaloPay...)</option>
                        <option value="TON Wallet">Ví TON (The Open Network)</option>
                    </select>

                    <textarea id="w-info" placeholder="Nội dung: Tên ngân hàng, Số tài khoản, Tên chủ thẻ... (Nếu dùng Ví điện tử thì điền tên ví vào mục Ngân hàng)" style="width:100%; height:100px; background:#2b3139; color:white; border-radius:10px; border:1px solid #474d57; padding:12px; box-sizing:border-box; margin-bottom:15px; font-family: sans-serif; resize: none;"></textarea>
                    
                    <div id="ton-rate-box" style="display:none; background: rgba(59, 130, 246, 0.1); padding: 10px; border-radius: 8px; font-size: 11px; color: #3b82f6; margin-bottom: 15px;">
                        ℹ️ <b>Tỷ giá TON:</b> 1 TON ≈ <span id="current-ton-price">...</span> VNĐ
                    </div>

                    <button class="btn-confirm" onclick="requestWithdraw()">GỬI YÊU CẦU RÚT</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user;
        let adController;
        let config = {};

        async function init() {
            config = await (await fetch('/api/config')).json();
            if (window.Adsgram) {
                adController = window.Adsgram.init({ 
                    blockId: config.blockId,
                    params: { userId: user.id.toString() } 
                });
            }
            if(config.tonPrice) {
                document.getElementById('current-ton-price').innerText = config.tonPrice.toLocaleString();
            }
            updateUI();
        }

        function toggleLimit() {
            const unit = document.getElementById('w-unit').value;
            const limitTxt = document.getElementById('withdraw-limit');
            const tonBox = document.getElementById('ton-rate-box');
            const method = document.getElementById('w-method');

            if (unit === 'VND') {
                limitTxt.innerText = "Tối thiểu: 2,000 VNĐ";
                tonBox.style.display = 'none';
                method.value = "Ngân hàng";
            } else {
                limitTxt.innerText = "Tối thiểu: 0.0003 TON";
                tonBox.style.display = 'block';
                method.value = "TON Wallet";
            }
        }

        async function updateUI() {
            const res = await fetch('/api/user-status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id: user.id, first_name: user.first_name, 
                    username: user.username, start_param: tg.initDataUnsafe.start_param
                })
            });
            const d = await res.json();
            document.getElementById('b-coins').innerText = d.coins.toLocaleString();
            document.getElementById('b-vnd').innerText = `≈ ${(d.coins/1000).toLocaleString()} VNĐ`;
            document.getElementById('s-free').innerText = d.spinsLeft;
            document.getElementById('s-ads').innerText = (d.dailyAdsCount || 0) + '/15';
            document.getElementById('ref-link').value = `https://t.me/${config.botUser}/app?startapp=${user.id}`;
        }

        async function claim(type) {
            const res = await fetch('/api/action', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: user.id, action: type })
            });
            const r = await res.json();
            if (r.ok) {
                tg.showAlert(`🎉 +${r.lucky.toLocaleString()} xu!`);
                updateUI();
            } else tg.showAlert(r.msg || "Hết lượt hoặc có lỗi!");
        }

        function showAds() {
            if (!adController) return tg.showAlert("QC đang tải...");
            adController.show().then(() => claim('ads')).catch(() => tg.showAlert("Bạn chưa xem hết quảng cáo"));
        }

        async function requestWithdraw() {
            const amount = document.getElementById('w-amount').value;
            const unit = document.getElementById('w-unit').value;
            const info = document.getElementById('w-info').value;
            const method = document.getElementById('w-method').value;

            if(!amount || !info) return tg.showAlert("Vui lòng điền đủ thông tin!");
            
            // Validate sơ bộ tại Client
            if(unit === 'VND' && amount < 2000) return tg.showAlert("VNĐ tối thiểu là 2,000");
            if(unit === 'TON' && amount < 0.0003) return tg.showAlert("TON tối thiểu là 0.0003");

            const res = await fetch('/api/withdraw', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    id: user.id, 
                    amountReq: parseFloat(amount), 
                    unit: unit,
                    method: method, 
                    address: info 
                })
            });
            const r = await res.json();
            if(r.ok) {
                tg.showAlert("✅ Đã gửi yêu cầu! Vui lòng chờ Admin duyệt.");
                updateUI();
            } else tg.showAlert(r.msg);
        }

        function openTab(evt, name) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            evt.currentTarget.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function copyLink() {
            const el = document.getElementById('ref-link');
            el.select();
            document.execCommand('copy');
            tg.showAlert("Đã sao chép link mời!");
        }

        init(); 
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
