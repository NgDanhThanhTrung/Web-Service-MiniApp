<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siêu Cấp Kiếm Xu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        :root { --gold: #f1b90c; --bg: #0b0e11; --card: #1e2329; --blue: #3b82f6; --green: #0ecb81; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; -webkit-user-select: none; }
        .header { text-align: center; margin-bottom: 20px; }
        .user-info { color: var(--gold); font-size: 14px; margin-bottom: 10px; font-weight: bold; }
        .balance-card { background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .task-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .task-card { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; transition: 0.2s; cursor: pointer; }
        .task-card:active { transform: scale(0.98); background: #2b3139; }
        .task-icon { font-size: 24px; width: 45px; height: 45px; background: rgba(241,185,12,0.1); display: flex; align-items: center; justify-content: center; border-radius: 12px; }
        .task-info { flex: 1; }
        .task-info h3 { margin: 0; font-size: 15px; color: var(--gold); }
        .task-info p { margin: 3px 0 0; font-size: 11px; color: #848e9c; }
        .task-action { background: var(--blue); color: white; padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; }
        
        .mining-section { background: #161a1e; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--gold); text-align: center; }
        .mining-btn { background: var(--gold); color: black; padding: 15px; border-radius: 25px; border: none; font-weight: bold; font-size: 16px; width: 100%; cursor: pointer; transition: 0.3s; }
        .mining-btn:disabled { background: #444; color: #888; }
        .mining-btn.ready { background: var(--green); color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(14, 203, 129, 0.4);} 70% {box-shadow: 0 0 0 10px rgba(14, 203, 129, 0);} 100% {box-shadow: 0 0 0 0 rgba(14, 203, 129, 0);} }

        .tabs { display: flex; gap: 8px; background: var(--card); padding: 10px 15px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; border-top: 1px solid #333; padding-bottom: calc(10px + env(safe-area-inset-bottom, 10px)); }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 20px; background: none; color: #848e9c; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .tab-btn.active { background: #2b3139; color: var(--gold); font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .main { padding-bottom: 120px; }
        .soft-input { width: 100%; padding: 15px; border-radius: 20px; border: 1px solid #333; background: #1e2329; color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; font-size: 14px; }
        .progress-box { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 15px; text-align: center; border: 1px dashed #444; }
        .bar-bg { width: 100%; height: 10px; background: #000; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        #bar-fill { width: 0%; height: 100%; background: var(--gold); transition: 1s ease; }
        .btn-main { background: var(--gold); color: black; padding: 15px; border-radius: 25px; border: none; font-weight: bold; font-size: 15px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="user-info">👤 <span id="u-name">...</span> (Lvl <span id="u-level">1</span>)</div>
            <div class="balance-card">
                <small>SỐ DƯ HIỆN TẠI</small>
                <h1 id="b-coins" style="margin: 5px 0; font-size: 30px;">0 XU</h1>
                <p id="b-vnd" style="margin: 0; color: var(--gold); font-weight: bold;">≈ 0 VNĐ</p>
                <div style="margin-top: 10px; font-size: 12px; color: #0ecb81;">💎 Kim cương: <span id="u-diamonds">0</span></div>
            </div>
        </header>

        <main class="main">
            <div id="play" class="tab-content active">
                <div class="mining-section">
                    <div id="mining-timer" style="font-size: 12px; color: #848e9c; margin-bottom: 8px;">Đang tải...</div>
                    <button id="btn-mining" class="mining-btn" onclick="handleMining()">KIỂM TRA...</button>
                    <p style="font-size: 10px; color: #555; margin-top: 5px;">Tốc độ: <span id="mining-rate">250,000</span> XU / 6h</p>
                </div>

                <div class="task-list">
                    <div class="task-card" onclick="triggerAd('video')">
                        <div class="task-icon">🎬</div>
                        <div class="task-info">
                            <h3>Xem Video Rewarded</h3>
                            <p>Nhận ngay 250.000 Xu (125đ)</p>
                        </div>
                        <div class="task-action">Xem</div>
                    </div>
                    <div class="task-card" onclick="triggerAd('interstitial')">
                        <div class="task-icon">🖼️</div>
                        <div class="task-info">
                            <h3>Mở Quảng Cáo Nhanh</h3>
                            <p>Nhận ngay 100.000 Xu (50đ)</p>
                        </div>
                        <div class="task-action">Mở</div>
                    </div>
                </div>
            </div>

            <div id="ref" class="tab-content">
                <div class="progress-box" style="border-color: var(--gold);">
                    <h3 style="color: var(--gold); margin-top:0;">🎁 Mời Bạn Bè</h3>
                    <p style="font-size: 12px; color: #848e9c;">Nhận xu thưởng khi bạn bè tham gia.</p>
                    <input type="text" id="ref-link" class="soft-input" readonly>
                    <button class="btn-main" onclick="copyLink()">SAO CHÉP LINK</button>
                </div>
            </div>

            <div id="bank" class="tab-content">
                <div class="progress-box">
                    <small>Điều kiện: Xem <span id="count-ads">0</span>/15 quảng cáo hôm nay</small>
                    <div class="bar-bg"><div id="bar-fill"></div></div>
                </div>
                <div class="withdraw-form">
                    <input type="number" id="w-amount" class="soft-input" placeholder="Số xu rút (Min 4.000.000)">
                    <select id="w-method" class="soft-input">
                        <option value="Momo">Ví Momo</option>
                        <option value="ATM">Ngân hàng (ATM)</option>
                        <option value="TON">Ví TON </option>
                    </select>
                    <textarea id="w-info" class="soft-input" style="height: 80px;" placeholder="STK, Tên chủ TK, Tên Ngân hàng..."></textarea>
                    <button class="btn-main" onclick="requestWithdraw()">GỬI YÊU CẦU RÚT TIỀN</button>
                </div>
            </div>
        </main>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'play')">⛏️ ĐÀO XU</button>
            <button class="tab-btn" onclick="openTab(event, 'ref')">👥 MỜI BẠN</button>
            <button class="tab-btn" onclick="openTab(event, 'bank')">🏦 RÚT TIỀN</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const rawUser = tg.initDataUnsafe.user || { id: 12345678, first_name: "Guest" };
        let userData = {};
        let displayCoins = 0; 

        const ADS_CONFIG = { video: "30955", interstitial: "int-30961", banner: "task-30959" };

        async function init() {
            document.getElementById('u-name').innerText = rawUser.first_name;
            const botUser = "MiniApp_NgDanhThanhTrung_Bot"; 
            document.getElementById('ref-link').value = `https://t.me/${botUser}/app?startapp=${rawUser.id}`;
            
            await updateUI();
            
            // 1. Tự động cộng xu vào hiển thị mỗi giây (ảo)
            setInterval(() => {
                if (userData.isMining) {
                    // Tốc độ mặc định 12 xu/s, có thể điều chỉnh theo level
                    const ratePerSecond = 12.0 + ((userData.level || 1) - 1) * 0.2;
                    displayCoins += ratePerSecond;
                    document.getElementById('b-coins').innerText = Math.floor(displayCoins).toLocaleString() + " XU";
                }
            }, 1000);

            // 2. Đồng bộ thật với Server mỗi 60 giây
            setInterval(syncCoinsWithServer, 60000);
            
            // 3. Update timer mỗi giây
            setInterval(updateMiningTimer, 1000);
        }

        async function updateUI() {
            try {
                const res = await fetch('/api/user-status', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: rawUser.id, first_name: rawUser.first_name })
                });
                userData = await res.json();
                
                displayCoins = userData.totalCoins || 0;
                document.getElementById('b-coins').innerText = displayCoins.toLocaleString() + " XU";
                document.getElementById('b-vnd').innerText = `≈ ${Math.floor(displayCoins / 2000).toLocaleString()} VNĐ`;
                document.getElementById('u-level').innerText = userData.level || 1;
                document.getElementById('u-diamonds').innerText = (userData.diamonds || 0).toLocaleString();
                document.getElementById('mining-rate').innerText = (250000 + (userData.level - 1) * 100000).toLocaleString();
                
                const ads = userData.adsWatchedToday || 0;
                document.getElementById('count-ads').innerText = ads;
                document.getElementById('bar-fill').style.width = Math.min((ads / 15) * 100, 100) + '%';
                
                updateMiningTimer();
            } catch (e) { console.error(e); }
        }

        async function syncCoinsWithServer() {
            if (!userData.isMining) return;
            try {
                const res = await fetch('/api/sync-mining', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: rawUser.id })
                });
                const data = await res.json();
                if (data.ok) {
                    displayCoins = data.newTotal; // Cập nhật lại chuẩn xác theo server
                    document.getElementById('b-coins').innerText = Math.floor(displayCoins).toLocaleString() + " XU";
                }
            } catch (e) { console.error("Lỗi đồng bộ:", e); }
        }

        function updateMiningTimer() {
            if (!userData.isMining) {
                const btn = document.getElementById('btn-mining');
                btn.innerText = "BẮT ĐẦU ĐÀO (6H)";
                btn.disabled = false;
                btn.className = "mining-btn";
                document.getElementById('mining-timer').innerText = "Máy đào đang chờ lệnh";
                return;
            }

            const diff = new Date().getTime() - new Date(userData.miningStartedAt).getTime();
            const SIX_HOURS = 6 * 60 * 60 * 1000;

            if (diff >= SIX_HOURS) {
                const btn = document.getElementById('btn-mining');
                btn.innerText = "NHẬN XU NGAY";
                btn.disabled = false;
                btn.className = "mining-btn ready";
                document.getElementById('mining-timer').innerText = "✅ Đã đào xong!";
            } else {
                const remaining = SIX_HOURS - diff;
                const h = Math.floor(remaining / 3600000);
                const m = Math.floor((remaining % 3600000) / 60000);
                const s = Math.floor((remaining % 60000) / 1000);
                document.getElementById('btn-mining').innerText = `ĐANG ĐÀO... ${h}h ${m}m ${s}s`;
                document.getElementById('btn-mining').disabled = true;
                document.getElementById('mining-timer').innerText = "Máy đang hoạt động hết công suất";
            }
        }

        async function handleMining() {
            tg.HapticFeedback.impactOccurred('medium');
            const action = document.getElementById('btn-mining').classList.contains('ready') ? 'claim' : 'start';
            const res = await fetch('/api/mining', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: rawUser.id, action })
            });
            const r = await res.json();
            if (r.ok) {
                if (action === 'claim') tg.showAlert(`🎉 Bạn đã nhận +${r.reward.toLocaleString()} XU!`);
                updateUI();
            } else tg.showAlert(r.msg);
        }

        function triggerAd(type) {
            if (!window.Adsgram) return;
            const AdController = window.Adsgram.init({ blockId: ADS_CONFIG[type], params: { userId: rawUser.id.toString() } });
            AdController.show().then(() => {
                setTimeout(updateUI, 2000);
            }).catch(e => console.error(e));
        }

        async function requestWithdraw() {
            const amount = document.getElementById('w-amount').value;
            const info = document.getElementById('w-info').value;
            const method = document.getElementById('w-method').value;

            if (amount < 4000000) return tg.showAlert("Tối thiểu rút 4.000.000 XU!");
            if (!info) return tg.showAlert("Vui lòng điền thông tin nhận tiền!");

            const res = await fetch('/api/withdraw', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: rawUser.id, amountXu: parseInt(amount), method, address: info })
            });
            const r = await res.json();
            if (r.ok) {
                tg.showAlert("🚀 Đã gửi yêu cầu thành công!");
                updateUI();
            } else tg.showAlert(r.msg);
        }

        function openTab(evt, name) {
            tg.HapticFeedback.impactOccurred('light');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        function copyLink() {
            const el = document.getElementById('ref-link');
            el.select();
            document.execCommand('copy');
            tg.showAlert("📋 Đã sao chép link!");
        }

        init();
    </script>
</body>
</html>
