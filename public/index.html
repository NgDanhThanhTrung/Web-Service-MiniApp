<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siêu Cấp Kiếm Xu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="user-info">
            <div id="avatar">?</div>
            <div class="meta">
                <div id="u-name">Đang tải...</div>
                <div id="u-username">@username</div>
            </div>
        </div>
        <div class="balance-card">
            <p>SỐ DƯ COINS</p>
            <h1 id="balance">0</h1>
            <p id="vnd">≈ 0 VNĐ</p>
        </div>
    </header>

    <div class="stats">
        <div class="stat">Free: <b id="spins">0</b></div>
        <div class="stat">Ads: <b id="ads">0/15</b></div>
    </div>

    <div class="actions">
        <button class="btn-main" onclick="claim(false)">🎁 NHẬN XU FREE</button>
        <button class="btn-ads" onclick="showAds()">📺 XEM ADS NHẬN XU</button>
    </div>

    <nav class="nav">
        <div class="nav-item active">🎰 Chơi</div>
        <div class="nav-item" onclick="tg.showAlert('Tính năng Referral đang nâng cấp!')">👥 Bạn bè</div>
        <div class="nav-item" onclick="window.location.href='/account'">⚙️ Admin</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user;
        let ads;

        async function init() {
            const cfg = await (await fetch('/api/config')).json();
            if (window.Adsgram) ads = window.Adsgram.init({ blockId: cfg.adsgramId });
            update();
        }

        async function update() {
            if (!user) return;
            const res = await fetch('/api/status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.id.toString(), username: user.username, name: user.first_name })
            });
            const d = await res.json();
            document.getElementById('u-name').innerText = d.name;
            document.getElementById('u-username').innerText = d.username !== 'n/a' ? '@'+d.username : '';
            document.getElementById('avatar').innerText = d.name.charAt(0).toUpperCase();
            document.getElementById('balance').innerText = d.totalCoins.toLocaleString();
            document.getElementById('vnd').innerText = `≈ ${(d.totalCoins/1000).toLocaleString()} VNĐ`;
            document.getElementById('spins').innerText = d.spinsLeft;
            document.getElementById('ads').innerText = d.adsWatchedToday + '/15';
        }

        async function claim(isAds) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            const res = await fetch('/api/claim', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.id.toString(), isAds })
            });
            const r = await res.json();
            if (r.success) {
                tg.showAlert(`🎉 +${r.lucky.toLocaleString()} xu!`);
                update();
            } else tg.showAlert(r.message);
        }

        function showAds() {
            if (!ads) return tg.showAlert("QC chưa sẵn sàng");
            ads.show().then(() => claim(true)).catch(() => tg.showAlert("Bạn chưa xem hết QC"));
        }

        init(); tg.expand();
    </script>
</body>
</html>
