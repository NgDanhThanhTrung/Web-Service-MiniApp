<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Spin Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        :root {
            --tg-theme-bg: #f0f2f5;
            --main-color: #0088cc;
            --accent-color: #f39c12;
            --text-color: #222;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-bg);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }

        /* Tabs Navigation */
        .tabs {
            display: flex;
            background: #eee;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab.active {
            background: #fff;
            color: var(--main-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Balance Display */
        .balance-section {
            margin-bottom: 25px;
        }
        #balance {
            font-size: 40px;
            font-weight: 800;
            color: var(--accent-color);
            margin: 5px 0;
        }
        .sub-text {
            color: #888;
            font-size: 14px;
        }

        /* Content Sections */
        .content { display: none; }
        .content.active { display: block; }

        /* Buttons & Inputs */
        .btn {
            background-color: var(--main-color);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-withdraw { background-color: var(--accent-color); }
        .btn-ref { background-color: #28a745; }

        input, select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .info-box {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('play')">🎰 Chơi</div>
            <div class="tab" onclick="switchTab('ref')">👥 Bạn bè</div>
            <div class="tab" onclick="switchTab('bank')">🏦 Rút tiền</div>
        </div>

        <div class="balance-section">
            <div class="sub-text">Số dư của bạn</div>
            <div id="balance">0 🪙</div>
            <div id="vnd-value" class="sub-text">≈ 0 VNĐ</div>
        </div>

        <div id="play" class="content active">
            <div class="info-grid">
                <div class="info-box">Lượt Free: <b id="spins">0</b></div>
                <div class="info-box">QC hôm nay: <b id="ads">0/15</b></div>
            </div>
            <button class="btn" onclick="handleAction()">BẮT ĐẦU NHẬN XU</button>
            <p class="sub-text" style="margin-top:15px">Hết lượt Free? Xem quảng cáo để nhận thêm lượt quay!</p>
        </div>

        <div id="ref" class="content">
            <p style="font-weight: bold;">Mời bạn bè - Nhận 10.000 xu</p>
            <p class="sub-text">Người được mời nhận thêm 2 lượt quay free.</p>
            <input type="text" id="ref-url" readonly onclick="this.select()">
            <button class="btn btn-ref" onclick="shareRef()">GỬI LINK MỜI</button>
        </div>

        <div id="bank" class="content">
            <select id="w-method">
                <option value="Momo">Ví Momo</option>
                <option value="ATM">Ngân hàng (STK)</option>
                <option value="TheCao">Thẻ cào điện thoại</option>
            </select>
            <input type="number" id="w-amount" placeholder="Số
