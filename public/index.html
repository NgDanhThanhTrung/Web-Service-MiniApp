<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sieu Cap Kiem Xu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #0f172a);
            --tg-secondary: var(--tg-theme-secondary-bg-color, #1e293b);
            --tg-text: var(--tg-theme-text-color, #ffffff);
            --accent: #3b82f6;
            --gold: #fbbf24;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--tg-bg);
            color: var(--tg-text);
            margin: 0; padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* Header phong cách hiện đại */
        .header {
            background: linear-gradient(135deg, #2563eb, #1d4b73);
            padding: 30px 20px;
            text-align: center;
            border-bottom-left-radius: 35px;
            border-bottom-right-radius: 35px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .balance-label { font-size: 12px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1.5px; }
        .balance-val { font-size: 38px; font-weight: 800; color: var(--gold); margin: 5px 0; }

        .content { padding: 20px; }
        .card {
            background: var(--tg-secondary);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .btn-main {
            background: #3b82f6; color: #fff; border: none;
            width: 100%; padding: 18px; border-radius: 16px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .btn-main:active { transform: scale(0.98); }

        /* Bottom Nav Bar */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: var(--tg-secondary);
            display: flex; height: 70px;
            border-top: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-size: 12px; opacity: 0.6;
        }
        .nav-item.active { color: var(--accent); opacity: 1; font-weight: bold; }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        .hidden { display: none; }
        input, select {
            width: 100%; padding: 15px; margin: 10px 0;
            background: rgba(0,0,0,0.2); border: 1px solid #334155;
            border-radius: 12px; color: #fff; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="balance-label">Tài khoản khả dụng</div>
        <div id="balance" class="balance-val">0 🪙</div>
        <div id="vnd" style="opacity: 0.8; font-size: 14px;">≈ 0 VNĐ</div>
    </header>

    <div class="content">
        <div id="tab-play" class="tab-content">
            <div class="card" style="display: flex; justify-content: space-around; text-align: center;">
                <div><small style="opacity: 0.6;">Lượt Free</small><div id="spins" style="font-size: 20px; font-weight: bold; color: var(--accent);">0</div></div>
                <div><small style="opacity: 0.6;">Đã xem Ads</small><div id="ads" style="font-size: 20px; font-weight: bold; color: #f87171;">0/15</div></div>
            </div>
            <button class="btn-main" onclick="handleClaim()">NHẬN XU NGAY</button>
            <p style="text-align: center; font-size: 12px; opacity: 0.5; margin-top: 15px;">Mẹo: Hết lượt free hãy xem quảng cáo để nhận thêm!</p>
        </div>

        <div id="tab-ref" class="tab-content hidden">
            <div class="card">
                <h3>👥 Mời Bạn Bè</h3>
                <p style="font-size: 14px; opacity: 0.7;">Nhận 10.000 xu cho mỗi bạn bè tham gia.</p>
                <input type="text" id="ref-url" readonly onclick="this.select()">
                <button class="btn-main" style="background: #10b981; box-shadow: none;" onclick="copyRef()">COPY LINK MỜI</button>
            </div>
        </div>

        <div id="tab-withdraw" class="tab-content hidden">
            <div class="card">
                <h3>💳 Rút Tiền</h3>
                <select id="w-method">
                    <option value="Momo">Ví Momo</option>
                    <option value="Bank">Ngân Hàng</option>
                </select>
                <input type="number" id="w-amount" placeholder="Số tiền VNĐ">
                <input type="text" id="w-details" placeholder="Số điện thoại hoặc Số tài khoản">
                <button class="btn-main" style="background: var(--gold); box-shadow: none; color: #000;" onclick="doWithdraw()">GỬI YÊU CẦU</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div id="n-play" class="nav-item active" onclick="switchTab('play')"><span class="nav-icon">🎰</span>Chơi</div>
        <div id="n-ref" class="nav-item" onclick="switchTab('ref')"><span class="nav-icon">👥</span>Bạn bè</div>
        <div id="n-withdraw" class="nav-item" onclick="switchTab('withdraw')"><span class="nav-icon">💳</span>Ví</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user;
        let adController, botName = "";

        // 1. Khởi tạo đồng bộ
        async function init() {
            const cfg = await (await fetch('/api/config')).json();
            botName = cfg.botUsername;
            if (window.Adsgram) adController = window.Adsgram.init({ blockId: cfg.adsgramId });
            updateStatus();
        }

        // 2. Tải dữ liệu & Nhận diện Telegram
        async function updateStatus() {
            if (!user) return;
            const res = await fetch('/api/status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    telegramId: user.id.toString(),
                    username: user.username || "n/a",
                    name: user.first_name,
                    refId: tg.initDataUnsafe.start_param
                })
            });
            const d = await res.json();
            document.getElementById('balance').innerText = d.totalCoins.toLocaleString() + ' 🪙';
            document.getElementById('vnd').innerText = `≈ ${(d.totalCoins/1000).toLocaleString()} VNĐ`;
            document.getElementById('spins').innerText = d.spinsLeft;
            document.getElementById('ads').innerText = d.adsWatchedToday + '/15';
            document.getElementById('ref-url').value = `https://t.me/${botName}/app?startapp=${user.id}`;
        }

        // 3. Xử lý nhận xu
        async function handleClaim() {
            haptic('light');
            const spins = parseInt(document.getElementById('spins').innerText);
            if (spins > 0) return callClaim();
            
            if (adController) {
                adController.show().then(() => callClaim()).catch(() => tg.showAlert("Bạn chưa xem hết QC!"));
            }
        }

        async function callClaim() {
            const res = await fetch('/api/claim', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.id.toString() })
            });
            const r = await res.json();
            if (r.success) {
                haptic('success');
                tg.showAlert(`🎉 +${r.lucky.toLocaleString()} xu!`);
                updateStatus();
            } else tg.showAlert(r.message);
        }

        // 4. Rút tiền
        async function doWithdraw() {
            const amount = document.getElementById('w-amount').value;
            const details = document.getElementById('w-details').value;
            if(!amount || !details) return tg.showAlert("Vui lòng điền đủ!");

            const res = await fetch('/api/withdraw', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    telegramId: user.id.toString(),
                    amountVnd: amount,
                    method: document.getElementById('w-method').value,
                    details: details
                })
            });
            const r = await res.json();
            if (r.success) {
                tg.showConfirm("✅ Đã gửi đơn rút! Admin sẽ duyệt sớm.");
                updateStatus();
            } else tg.showAlert(r.message);
        }

        // Tiện ích UI
        function switchTab(t) {
            haptic('light');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.getElementById('n-'+t).classList.add('active');
        }

        function haptic(s) { if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred(s); }
        function copyRef() {
            const input = document.getElementById('ref-url');
            input.select(); document.execCommand('copy');
            tg.showAlert("Đã copy link mời!");
        }

        init(); tg.expand();
    </script>
</body>
</html>
