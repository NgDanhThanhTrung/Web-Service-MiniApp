<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siêu Cấp Kiếm Xu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        :root { --gold: #f1b90c; --bg: #0b0e11; --card: #1e2329; --blue: #3b82f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .user-info { color: var(--gold); font-size: 14px; margin-bottom: 10px; font-weight: bold; }
        
        .balance-card { background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* Giao diện Task Card mới */
        .task-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .task-card { 
            background: var(--card); border: 1px solid #333; border-radius: 20px; 
            padding: 15px; display: flex; align-items: center; gap: 15px; 
            transition: 0.2s; cursor: pointer; 
        }
        .task-card:active { transform: scale(0.98); background: #2b3139; }
        .task-icon { font-size: 24px; width: 45px; height: 45px; background: rgba(241,185,12,0.1); display: flex; align-items: center; justify-content: center; border-radius: 12px; }
        .task-info { flex: 1; }
        .task-info h3 { margin: 0; font-size: 15px; color: var(--gold); }
        .task-info p { margin: 3px 0 0; font-size: 11px; color: #848e9c; }
        .task-action { background: var(--blue); color: white; padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; }

        .tabs { 
            display: flex; gap: 8px; background: var(--card); padding: 10px 15px; 
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
            border-top: 1px solid #333; padding-bottom: calc(10px + env(safe-area-inset-bottom, 10px));
        }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 20px; background: none; color: #848e9c; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .tab-btn.active { background: #2b3139; color: var(--gold); font-weight: bold; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .main { padding-bottom: 100px; }

        .soft-input { width: 100%; padding: 15px; border-radius: 20px; border: 1px solid #333; background: #1e2329; color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; font-size: 14px; }
        .progress-box { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 15px; text-align: center; border: 1px dashed #444; }
        .bar-bg { width: 100%; height: 10px; background: #000; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        #bar-fill { width: 0%; height: 100%; background: var(--gold); transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }

        .btn-soft { padding: 15px; border-radius: 25px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn-main { background: var(--gold); color: black; }
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="user-info">👤 <span id="u-name">...</span> (@<span id="u-user">...</span>)</div>
            <div class="balance-card">
                <small style="color: #848e9c;">TỔNG TÀI SẢN</small>
                <h1 id="b-coins" style="margin: 5px 0; font-size: 32px;">0 XU</h1>
                <p id="b-vnd" style="margin: 0; color: var(--gold);">≈ 0 VNĐ</p>
            </div>
        </header>

        <main class="main">
            <div id="play" class="tab-content active">
                <button class="btn-soft btn-main" onclick="claim('spin')" style="margin-bottom: 20px;">🎡 QUAY THƯỞNG FREE (<span id="s-free">0</span>)</button>

                <div class="task-list">
                    <div class="task-card" onclick="triggerAd('video')">
                        <div class="task-icon">🎬</div>
                        <div class="task-info">
                            <h3>Rewarded Video</h3>
                            <p>Nhận ngay 75.000 Xu</p>
                        </div>
                        <div class="task-action">Xem</div>
                    </div>

                    <div class="task-card" onclick="triggerAd('interstitial')">
                        <div class="task-icon">🖼️</div>
                        <div class="task-info">
                            <h3>Interstitial Ad</h3>
                            <p>Nhận ngay 50.000 Xu</p>
                        </div>
                        <div class="task-action">Mở</div>
                    </div>

                    <div class="task-card" onclick="triggerAd('banner')">
                        <div class="task-icon">🎫</div>
                        <div class="task-info">
                            <h3>Static Banner</h3>
                            <p>Nhận ngay 25.000 Xu</p>
                        </div>
                        <div class="task-action">Xem</div>
                    </div>
                </div>
            </div>

            <div id="ref" class="tab-content">
                <div class="progress-box" style="border-color: var(--gold); border-style: solid;">
                    <h3 style="color: var(--gold); margin-top:0;">🎁 Mời Bạn Bè</h3>
                    <p style="font-size: 12px; color: #848e9c;">Nhận 100k Xu mỗi lượt mời thành công.</p>
                    <input type="text" id="ref-link" class="soft-input" readonly style="text-align: center;">
                    <button class="btn-soft btn-main" onclick="copyLink()">SAO CHÉP LINK</button>
                </div>
            </div>

            <div id="bank" class="tab-content">
                <div class="progress-box">
                    <small>Điều kiện rút: <span id="count-ads">0</span>/5 quảng cáo</small>
                    <div class="bar-bg"><div id="bar-fill"></div></div>
                </div>

                <div class="withdraw-form">
                    <input type="number" id="w-amount" class="soft-input" placeholder="Số xu (Min 300.000)">
                    <select id="w-method" class="soft-input">
                        <option value="Ngân hàng">Ngân hàng / Ví điện tử</option>
                        <option value="TON Wallet">Ví TON (Telegram)</option>
                    </select>
                    <textarea id="w-info" class="soft-input" style="height: 80px;" placeholder="STK, Tên Ngân hàng, Chủ tài khoản..."></textarea>
                    <button class="btn-soft btn-main" onclick="requestWithdraw()">RÚT TIỀN NGAY</button>
                </div>
            </div>
        </main>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'play')">🎡 KIẾM XU</button>
            <button class="tab-btn" onclick="openTab(event, 'ref')">👥 MỜI BẠN</button>
            <button class="tab-btn" onclick="openTab(event, 'bank')">🏦 RÚT TIỀN</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const rawUser = tg.initDataUnsafe.user || { id: 0, first_name: "Guest", username: "guest" };
        
        // --- CONFIG ADSGRAM IDS ---
        const ADS_CONFIG = {
            video: "30955",          // Thay bằng ID thật loại Video
            interstitial: "int-30961",   // Thay bằng ID thật loại Toàn màn hình
            banner: "task-30959"          // Thay bằng ID thật loại Banner
        };

        async function init() {
            document.getElementById('u-name').innerText = rawUser.first_name;
            document.getElementById('u-user').innerText = rawUser.username || "n/a";
            
            try {
                const config = await (await fetch('/api/config')).json();
                document.getElementById('ref-link').value = `https://t.me/${config.botUser}/app?startapp=${rawUser.id}`;
            } catch (e) {}

            updateUI();
            setupAutoAds(); // Khởi động tự động 5 phút
        }

        async function updateUI() {
            try {
                const res = await fetch('/api/user-status', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: rawUser.id, first_name: rawUser.first_name, username: rawUser.username })
                });
                const userData = await res.json();
                
                const coins = userData.totalCoins || 0;
                const ads = userData.adsWatchedToday || 0;

                document.getElementById('b-coins').innerText = coins.toLocaleString() + " XU";
                document.getElementById('b-vnd').innerText = `≈ ${(coins/1000).toLocaleString()} VNĐ`;
                document.getElementById('s-free').innerText = userData.spinsLeft || 0;
                document.getElementById('count-ads').innerText = ads;
                
                const progress = Math.min((ads / 5) * 100, 100);
                document.getElementById('bar-fill').style.width = progress + '%';
            } catch (e) {}
        }

        // HÀM CHẠY QUẢNG CÁO THEO LOẠI
        function triggerAd(type) {
            const blockId = ADS_CONFIG[type];
            if (!window.Adsgram) return;

            const AdController = window.Adsgram.init({ 
                blockId: blockId, 
                params: { userId: rawUser.id.toString() } 
            });

            AdController.show().then(() => {
                tg.showAlert(`✅ Đã xem xong ${type}! Vui lòng chờ cộng xu...`);
                setTimeout(updateUI, 2500);
            }).catch(() => {
                tg.showAlert("Hết quảng cáo hoặc lỗi tải. Thử lại sau nhé!");
            });
        }

        // TỰ ĐỘNG CHẠY INTERSTITIAL MỖI 5 PHÚT
        function setupAutoAds() {
            setInterval(() => {
                console.log("Auto triggering interstitial...");
                triggerAd('interstitial');
            }, 5 * 60 * 1000); 
        }

        async function claim(type) {
            const res = await fetch('/api/action', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: rawUser.id, action: type })
            });
            const r = await res.json();
            if (r.ok) {
                tg.showAlert(`🎉 +${r.lucky.toLocaleString()} xu!`);
                updateUI();
            } else tg.showAlert(r.msg);
        }

        async function requestWithdraw() {
            const amount = document.getElementById('w-amount').value;
            const info = document.getElementById('w-info').value;
            const method = document.getElementById('w-method').value;

            const res = await fetch('/api/withdraw', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: rawUser.id, amountXu: parseInt(amount), method, address: info })
            });
            const r = await res.json();
            if(r.ok) {
                tg.showAlert("🚀 Đã gửi yêu cầu! Vui lòng chờ Admin duyệt.");
                updateUI();
            } else tg.showAlert(r.msg);
        }

        function openTab(evt, name) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            evt.currentTarget.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function copyLink() {
            const el = document.getElementById('ref-link');
            el.select();
            document.execCommand('copy');
            tg.showAlert("📋 Đã sao chép link mời!");
        }

        init(); 
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
